<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copilot Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <!-- Markdown + sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <!-- Code highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --text:      #ececec;
      --muted:     #888;
      --accent:    #2f8fff;
      --accent-h:  #1a75f0;
      --user-bg:   #1e2a3a;
      --bot-bg:    #1a1a1a;
      --danger:    #e5534b;
      --radius:    12px;
      --sidebar-w: 260px;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #sidebar-header .logo { font-size: 22px; }
    #sidebar-header .brand { font-size: 15px; font-weight: 600; color: var(--text); }
    #new-chat-btn {
      margin: 12px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .15s;
    }
    #new-chat-btn:hover { background: var(--accent-h); }
    #sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .session-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: background .1s;
    }
    .session-item:hover { background: var(--surface2); color: var(--text); }
    .session-item.active { background: var(--surface2); color: var(--text); }
    .session-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .del-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      transition: opacity .15s;
    }
    .session-item:hover .del-btn { opacity: 1; }
    #sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    #logout-btn {
      width: 100%;
      padding: 9px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: color .15s, border-color .15s;
    }
    #logout-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── Main area ───────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
    }
    #chat-header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }

    /* ── Messages ────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }
    #messages:empty::after {
      content: "Send a message to start chatting with GitHub Copilot";
      display: block;
      text-align: center;
      color: var(--muted);
      margin-top: 30vh;
      font-size: 15px;
    }
    .msg-wrap {
      max-width: 780px;
      margin: 0 auto 24px;
      padding: 0 24px;
    }
    .msg-role {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
      color: var(--muted);
    }
    .msg-role.user { color: var(--accent); }
    .msg-role.assistant { color: #3fb950; }
    .msg-bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-bubble.user {
      background: var(--user-bg);
      border: 1px solid #2a3d57;
    }
    .msg-bubble.assistant {
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }
    /* Markdown styles inside bubbles */
    .msg-bubble p { margin-bottom: 12px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      margin: 16px 0 8px; font-weight: 600;
    }
    .msg-bubble code:not(pre code) {
      background: #2d2d2d;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: "SF Mono", Consolas, monospace;
    }
    .msg-bubble pre {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 12px 0;
      position: relative;
    }
    .msg-bubble pre code {
      font-family: "SF Mono", Consolas, monospace;
      font-size: 13px;
      background: none;
      padding: 0;
    }
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: color .15s;
    }
    .copy-btn:hover { color: var(--text); }
    .msg-bubble ul, .msg-bubble ol { padding-left: 22px; margin-bottom: 12px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 14px;
      color: var(--muted);
      margin: 12px 0;
    }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .msg-bubble th, .msg-bubble td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .msg-bubble th { background: var(--surface2); }

    /* Typing cursor */
    .typing-cursor::after {
      content: "▋";
      animation: blink .7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input area ──────────────────────────────────────── */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    #input-wrap {
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 14px;
      transition: border-color .15s;
    }
    #input-wrap:focus-within { border-color: var(--accent); }
    #prompt-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 200px;
      overflow-y: auto;
      font-family: inherit;
    }
    #prompt-input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, opacity .15s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-h); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }
    #input-hint {
      max-width: 780px;
      margin: 6px auto 0;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span class="logo">🤖</span>
    <span class="brand">Copilot Chat</span>
  </div>
  <button id="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New chat
  </button>
  <div id="sessions-list"></div>
  <div id="sidebar-footer">
    <button id="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="chat-header">
    <div class="status-dot"></div>
    <span>GitHub Copilot</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="prompt-input" rows="1" placeholder="Message Copilot…"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div id="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let currentSessionId = null;
const sessions = {}; // { id: { label, messages: [] } }
let isStreaming = false;

// ---------------------------------------------------------------------------
// Markdown renderer
// ---------------------------------------------------------------------------
marked.setOptions({ breaks: true, gfm: true });
function renderMarkdown(text) {
  // marked produces HTML; sanitize before inserting
  return DOMPurify.sanitize(marked.parse(text), { USE_PROFILES: { html: true } });
}

// ---------------------------------------------------------------------------
// Session management
// ---------------------------------------------------------------------------
async function newChat() {
  const res = await fetch("/api/sessions/new", { method: "POST" });
  const { session_id } = await res.json();
  sessions[session_id] = { label: "New chat", messages: [] };
  currentSessionId = session_id;
  renderSidebar();
  renderMessages();
}

async function loadSession(id) {
  currentSessionId = id;
  // Fetch history from server in case we're on a different page
  const res = await fetch(`/api/history?session_id=${id}`);
  const history = await res.json();
  if (!sessions[id]) sessions[id] = { label: "Chat", messages: [] };
  sessions[id].messages = history;
  renderSidebar();
  renderMessages();
}

async function deleteSession(id, event) {
  event.stopPropagation();
  await fetch(`/api/sessions/${id}`, { method: "DELETE" });
  delete sessions[id];
  if (currentSessionId === id) {
    const ids = Object.keys(sessions);
    if (ids.length) await loadSession(ids[ids.length - 1]);
    else await newChat();
  } else {
    renderSidebar();
  }
}

function renderSidebar() {
  const list = document.getElementById("sessions-list");
  list.innerHTML = "";
  const ids = Object.keys(sessions).reverse();
  for (const id of ids) {
    const s = sessions[id];
    const div = document.createElement("div");
    div.className = "session-item" + (id === currentSessionId ? " active" : "");
    div.innerHTML = `
      <span class="label">${escHtml(s.label)}</span>
      <button class="del-btn" onclick="deleteSession('${id}', event)" title="Delete">✕</button>
    `;
    div.addEventListener("click", () => loadSession(id));
    list.appendChild(div);
  }
}

// ---------------------------------------------------------------------------
// Message rendering
// ---------------------------------------------------------------------------
function renderMessages() {
  const container = document.getElementById("messages");
  container.innerHTML = "";
  if (!currentSessionId) return;
  const msgs = sessions[currentSessionId]?.messages || [];
  for (const msg of msgs) appendMessage(msg.role, msg.content, false);
  scrollToBottom();
}

function appendMessage(role, content, streaming = false) {
  const container = document.getElementById("messages");
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";

  const roleEl = document.createElement("div");
  roleEl.className = `msg-role ${role}`;
  roleEl.textContent = role === "user" ? "You" : "Copilot";

  const bubble = document.createElement("div");
  bubble.className = `msg-bubble ${role}`;
  if (streaming) bubble.classList.add("typing-cursor");

  if (role === "assistant") {
    bubble.innerHTML = renderMarkdown(content || "");
    addCopyButtons(bubble);
  } else {
    bubble.textContent = content;
  }

  wrap.appendChild(roleEl);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

function addCopyButtons(el) {
  el.querySelectorAll("pre").forEach(pre => {
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.querySelector("code")?.textContent || pre.textContent);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 2000);
    };
    pre.style.position = "relative";
    pre.appendChild(btn);
    // Highlight code blocks
    pre.querySelectorAll("code").forEach(c => hljs.highlightElement(c));
  });
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

// ---------------------------------------------------------------------------
// Send message
// ---------------------------------------------------------------------------
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById("prompt-input");
  const prompt = input.value.trim();
  if (!prompt) return;
  if (!currentSessionId) await newChat();

  input.value = "";
  input.style.height = "auto";

  // Add user message
  sessions[currentSessionId].messages.push({ role: "user", content: prompt });
  if (sessions[currentSessionId].label === "New chat") {
    sessions[currentSessionId].label = prompt.slice(0, 36) + (prompt.length > 36 ? "…" : "");
  }
  appendMessage("user", prompt, false);
  renderSidebar();

  // Add assistant bubble (streaming)
  const bubble = appendMessage("assistant", "", true);
  let fullText = "";
  isStreaming = true;
  document.getElementById("send-btn").disabled = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, session_id: currentSessionId }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === "chunk") {
            fullText += evt.text;
            bubble.classList.add("typing-cursor");
            bubble.innerHTML = renderMarkdown(fullText);
            addCopyButtons(bubble);
            scrollToBottom();
          } else if (evt.type === "done") {
            bubble.classList.remove("typing-cursor");
            sessions[currentSessionId].messages.push({ role: "assistant", content: fullText });
          } else if (evt.type === "error") {
            bubble.classList.remove("typing-cursor");
            bubble.innerHTML = `<span style="color:var(--danger)">Error: ${escHtml(evt.message)}</span>`;
            toast("Error: " + evt.message);
          }
        } catch (_) {}
      }
    }
  } catch (err) {
    bubble.classList.remove("typing-cursor");
    bubble.innerHTML = `<span style="color:var(--danger)">Connection error. Is the server running?</span>`;
  } finally {
    isStreaming = false;
    document.getElementById("send-btn").disabled = false;
    bubble.classList.remove("typing-cursor");
  }
}

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
async function logout() {
  await fetch("/api/logout", { method: "POST" });
  window.location.href = "/login.html";
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
}

// Auto-resize textarea
document.getElementById("prompt-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 200) + "px";
});

// Enter to send, Shift+Enter for newline
document.getElementById("prompt-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
(async () => {
  // Load existing sessions
  const res = await fetch("/api/sessions");
  const list = await res.json();
  if (list.length) {
    for (const { session_id, messages } of list) {
      sessions[session_id] = { label: "Chat", messages: [] };
    }
    await loadSession(list[list.length - 1].session_id);
  } else {
    await newChat();
  }
})();
</script>
</body>
</html>
