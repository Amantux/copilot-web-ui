<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copilot Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%236e40c9'/><text y='.9em' font-size='60' x='18'>✦</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #21262d;
      --surface3:   #30363d;
      --border:     #30363d;
      --border2:    #21262d;
      --text:       #e6edf3;
      --text2:      #8b949e;
      --accent:     #7c3aed;
      --accent2:    #a78bfa;
      --accent-h:   #6d28d9;
      --blue:       #388bfd;
      --green:      #3fb950;
      --orange:     #d29922;
      --danger:     #f85149;
      --user-bg:    #1c2230;
      --user-border:#2d3f5e;
      --radius:     10px;
      --sidebar-w:  260px;
      --font-mono:  "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .copilot-logo {
      width: 32px; height: 32px; flex-shrink: 0;
    }
    #sidebar-header .brand {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }
    #sidebar-header .brand small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text2);
    }

    #new-chat-btn {
      margin: 10px;
      padding: 8px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background .15s, transform .1s;
      letter-spacing: .01em;
    }
    #new-chat-btn:hover { background: var(--accent-h); }
    #new-chat-btn:active { transform: scale(.98); }

    #sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }
    .session-item {
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: background .1s, color .1s;
      margin-bottom: 1px;
    }
    .session-item:hover { background: var(--surface2); color: var(--text); }
    .session-item.active { background: var(--surface2); color: var(--text); }
    .session-item .s-icon { font-size: 12px; flex-shrink: 0; opacity: .7; }
    .session-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .del-btn {
      opacity: 0; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 14px;
      line-height: 1; padding: 1px 3px; border-radius: 4px;
      transition: opacity .1s, background .1s;
    }
    .session-item:hover .del-btn { opacity: .7; }
    .session-item .del-btn:hover { opacity: 1; background: rgba(248,81,73,.15); }

    #sidebar-footer {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .footer-info {
      font-size: 11px;
      color: var(--text2);
      text-align: center;
      padding: 2px 0;
    }
    #logout-btn {
      width: 100%;
      padding: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      transition: color .15s, border-color .15s, background .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #logout-btn:hover { color: var(--text); border-color: var(--text2); background: var(--surface2); }

    /* ── Main area ───────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text2);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }
    .model-badge {
      font-size: 11px;
      background: linear-gradient(135deg, #6e40c9 0%, #388bfd 100%);
      color: #fff;
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 500;
      letter-spacing: .01em;
    }

    /* ── Messages ────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0 8px;
      scroll-behavior: smooth;
    }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 16px; color: var(--text2);
      padding: 40px;
    }
    .empty-state .es-logo { opacity: .3; }
    .empty-state h2 { font-size: 20px; color: var(--text); font-weight: 600; }
    .empty-state p { font-size: 14px; text-align: center; max-width: 360px; line-height: 1.6; }
    .suggestion-chips {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px;
    }
    .chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px; font-size: 13px;
      color: var(--text2); cursor: pointer; transition: all .15s;
    }
    .chip:hover { background: var(--surface3); color: var(--text); border-color: var(--accent2); }

    .msg-wrap {
      max-width: 800px;
      margin: 0 auto 20px;
      padding: 0 24px;
      animation: fadeSlideIn .2s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 7px;
    }
    .msg-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; font-weight: 600;
    }
    .msg-avatar.user { background: var(--accent); color: #fff; }
    .msg-avatar.assistant { background: #6e40c9; }
    .msg-role-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .msg-time { font-size: 11px; color: var(--text2); margin-left: auto; }

    .msg-bubble {
      font-size: 15px;
      line-height: 1.7;
      word-break: break-word;
      padding: 13px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
    }
    .msg-bubble.user {
      background: var(--user-bg);
      border-color: var(--user-border);
      white-space: pre-wrap;
    }
    .msg-bubble.assistant {
      background: var(--surface);
    }

    /* Markdown inside bubbles */
    .msg-bubble p { margin-bottom: 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4 {
      margin: 16px 0 8px; font-weight: 600; line-height: 1.3;
    }
    .msg-bubble h1 { font-size: 20px; }
    .msg-bubble h2 { font-size: 17px; }
    .msg-bubble h3 { font-size: 15px; }
    .msg-bubble code:not(pre code) {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: var(--font-mono);
    }
    .msg-bubble pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin: 12px 0;
    }
    .pre-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .pre-lang { color: var(--text2); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .05em; }
    .copy-btn {
      background: none; border: none; color: var(--text2);
      cursor: pointer; font-size: 11px; padding: 2px 6px;
      border-radius: 4px; transition: all .15s;
      display: flex; align-items: center; gap: 4px;
    }
    .copy-btn:hover { color: var(--text); background: var(--surface3); }
    .msg-bubble pre code {
      display: block;
      font-family: var(--font-mono);
      font-size: 13px;
      background: none;
      padding: 12px;
      overflow-x: auto;
      line-height: 1.5;
    }
    .msg-bubble ul, .msg-bubble ol { padding-left: 24px; margin-bottom: 10px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--accent2);
      padding-left: 14px;
      color: var(--text2);
      margin: 12px 0;
      font-style: italic;
    }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 14px; }
    .msg-bubble th, .msg-bubble td {
      border: 1px solid var(--border);
      padding: 7px 12px;
      text-align: left;
    }
    .msg-bubble th { background: var(--surface2); font-weight: 600; }
    .msg-bubble tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .msg-bubble a { color: var(--blue); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Tool call badge */
    .tool-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; margin: 3px 0;
      font-size: 12px; color: var(--orange);
      font-family: var(--font-mono);
    }
    .tool-badge::before { content: "⚙"; font-style: normal; }

    /* Usage footer */
    .msg-usage {
      display: flex; gap: 12px; margin-top: 8px;
      font-size: 11px; color: var(--text2);
    }
    .usage-item { display: flex; align-items: center; gap: 4px; }
    .usage-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); }

    /* Typing indicator */
    .typing-indicator {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2); opacity: .4;
      animation: typingPulse 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingPulse {
      0%, 80%, 100% { opacity: .4; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.2); }
    }
    .typing-cursor::after {
      content: "▋";
      animation: blink .7s step-end infinite;
      color: var(--accent2);
      font-size: .85em;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input area ──────────────────────────────────────── */
    #input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    #input-wrap {
      max-width: 800px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    #input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }
    #prompt-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 200px;
      overflow-y: auto;
      font-family: inherit;
    }
    #prompt-input::placeholder { color: var(--text2); }
    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 7px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, opacity .15s, transform .1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-h); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; }
    #input-hint {
      max-width: 800px;
      margin: 5px auto 0;
      font-size: 11px;
      color: var(--text2);
      text-align: center;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 14px;
      border-radius: 8px; font-size: 13px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      transform: translateY(4px);
      z-index: 999;
      max-width: 300px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <svg class="copilot-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="16" fill="#6e40c9"/>
      <path d="M16 7C11.03 7 7 11.03 7 16c0 2.7 1.17 5.13 3.04 6.81A2 2 0 0 0 11 24h10a2 2 0 0 0 .96-1.19C23.83 21.13 25 18.7 25 16c0-4.97-4.03-9-9-9z" fill="white" opacity=".15"/>
      <circle cx="12" cy="16" r="2.5" fill="white"/>
      <circle cx="20" cy="16" r="2.5" fill="white"/>
      <path d="M12 20.5c0 0 1.5 2 4 2s4-2 4-2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M10 13.5C10 11.5 11.5 10 13 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M22 13.5C22 11.5 20.5 10 19 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="brand">
      GitHub Copilot
      <small>CLI Chat Interface</small>
    </div>
  </div>
  <button id="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
      <path d="M8 1.5a.5.5 0 0 1 .5.5v5.5H14a.5.5 0 0 1 0 1H8.5V14a.5.5 0 0 1-1 0V8.5H2a.5.5 0 0 1 0-1h5.5V2a.5.5 0 0 1 .5-.5z"/>
    </svg>
    New chat
  </button>
  <div id="sessions-list"></div>
  <div id="sidebar-footer">
    <button id="logout-btn" onclick="logout()">
      <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12">
        <path d="M2 2.75C2 1.784 2.784 1 3.75 1h5.5a.75.75 0 0 1 0 1.5h-5.5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h5.5a.75.75 0 0 1 0 1.5h-5.5A1.75 1.75 0 0 1 2 13.25Zm10.44 4.5-1.97-1.97a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l1.97-1.97H6.75a.75.75 0 0 1 0-1.5Z"/>
      </svg>
      Sign out
    </button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="chat-header">
    <div class="header-left">
      <div class="status-pill">
        <div class="status-dot"></div>
        Connected
      </div>
    </div>
    <div class="model-badge">claude-sonnet-4.6</div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="prompt-input" rows="1" placeholder="Ask Copilot anything…"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M.989 8 .064 2.68a1.342 1.342 0 0 1 1.85-1.319l13.048 5.32a1.342 1.342 0 0 1 0 2.638L1.914 14.639a1.342 1.342 0 0 1-1.85-1.32L.99 8Zm.603-5.288L2.38 7.25h4.87a.75.75 0 0 1 0 1.5H2.38l-.788 4.538L13.929 8Z"/>
        </svg>
      </button>
    </div>
    <div id="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let currentSessionId = null;
const sessions = {};
let isStreaming = false;

// ---------------------------------------------------------------------------
// Markdown renderer
// ---------------------------------------------------------------------------
marked.setOptions({ breaks: true, gfm: true });
function renderMarkdown(text) {
  return DOMPurify.sanitize(marked.parse(text), { USE_PROFILES: { html: true } });
}

function fmtTime(d = new Date()) {
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ---------------------------------------------------------------------------
// Session management
// ---------------------------------------------------------------------------
async function newChat() {
  const res = await fetch("/api/sessions/new", { method: "POST" });
  const { session_id } = await res.json();
  sessions[session_id] = { label: "New chat", messages: [], usage: null };
  currentSessionId = session_id;
  renderSidebar();
  renderMessages();
  document.getElementById("prompt-input").focus();
}

async function loadSession(id) {
  currentSessionId = id;
  const res = await fetch(`/api/history?session_id=${id}`);
  const history = await res.json();
  if (!sessions[id]) sessions[id] = { label: "Chat", messages: [], usage: null };
  sessions[id].messages = history;
  renderSidebar();
  renderMessages();
}

async function deleteSession(id, event) {
  event.stopPropagation();
  await fetch(`/api/sessions/${id}`, { method: "DELETE" });
  delete sessions[id];
  if (currentSessionId === id) {
    const ids = Object.keys(sessions);
    if (ids.length) await loadSession(ids[ids.length - 1]);
    else await newChat();
  } else {
    renderSidebar();
  }
}

function renderSidebar() {
  const list = document.getElementById("sessions-list");
  list.innerHTML = "";
  const ids = Object.keys(sessions).reverse();
  for (const id of ids) {
    const s = sessions[id];
    const div = document.createElement("div");
    div.className = "session-item" + (id === currentSessionId ? " active" : "");
    const count = s.messages.length;
    div.innerHTML = `
      <span class="s-icon">${count > 0 ? "💬" : "○"}</span>
      <span class="label">${escHtml(s.label)}</span>
      <button class="del-btn" onclick="deleteSession('${id}', event)" title="Delete">✕</button>
    `;
    div.addEventListener("click", () => loadSession(id));
    list.appendChild(div);
  }
}

// ---------------------------------------------------------------------------
// Message rendering
// ---------------------------------------------------------------------------
function showEmptyState() {
  const container = document.getElementById("messages");
  container.innerHTML = `
    <div class="empty-state">
      <svg class="es-logo copilot-logo" width="56" height="56" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="16" fill="#6e40c9"/>
        <path d="M16 7C11.03 7 7 11.03 7 16c0 2.7 1.17 5.13 3.04 6.81A2 2 0 0 0 11 24h10a2 2 0 0 0 .96-1.19C23.83 21.13 25 18.7 25 16c0-4.97-4.03-9-9-9z" fill="white" opacity=".15"/>
        <circle cx="12" cy="16" r="2.5" fill="white"/>
        <circle cx="20" cy="16" r="2.5" fill="white"/>
        <path d="M12 20.5c0 0 1.5 2 4 2s4-2 4-2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 13.5C10 11.5 11.5 10 13 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 13.5C22 11.5 20.5 10 19 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h2>GitHub Copilot</h2>
      <p>Your AI pair programmer. Ask anything — code questions, architecture decisions, debugging help.</p>
      <div class="suggestion-chips">
        <div class="chip" onclick="useChip(this)">Explain this codebase</div>
        <div class="chip" onclick="useChip(this)">Write unit tests</div>
        <div class="chip" onclick="useChip(this)">Find bugs in my code</div>
        <div class="chip" onclick="useChip(this)">Help me refactor</div>
      </div>
    </div>`;
}

function useChip(el) {
  const input = document.getElementById("prompt-input");
  input.value = el.textContent;
  input.focus();
  input.dispatchEvent(new Event("input"));
}

function renderMessages() {
  const container = document.getElementById("messages");
  container.innerHTML = "";
  if (!currentSessionId) return;
  const msgs = sessions[currentSessionId]?.messages || [];
  if (!msgs.length) { showEmptyState(); return; }
  for (const msg of msgs) appendMessage(msg.role, msg.content, false);
  scrollToBottom();
}

function appendMessage(role, content, streaming = false) {
  const container = document.getElementById("messages");
  // Remove empty state if present
  const es = container.querySelector(".empty-state");
  if (es) container.innerHTML = "";

  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";

  const meta = document.createElement("div");
  meta.className = "msg-meta";

  const avatar = document.createElement("div");
  avatar.className = `msg-avatar ${role}`;
  if (role === "user") {
    avatar.textContent = "U";
  } else {
    avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 32 32" fill="none"><circle cx="12" cy="16" r="2.5" fill="white"/><circle cx="20" cy="16" r="2.5" fill="white"/></svg>`;
  }

  const label = document.createElement("div");
  label.className = "msg-role-label";
  label.textContent = role === "user" ? "You" : "GitHub Copilot";

  const timeEl = document.createElement("div");
  timeEl.className = "msg-time";
  timeEl.textContent = fmtTime();

  meta.append(avatar, label, timeEl);

  const bubble = document.createElement("div");
  bubble.className = `msg-bubble ${role}`;

  if (streaming && role === "assistant") {
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
  } else if (role === "assistant") {
    bubble.innerHTML = renderMarkdown(content || "");
    addCodeEnhancements(bubble);
  } else {
    bubble.textContent = content;
  }

  wrap.append(meta, bubble);
  container.appendChild(wrap);
  scrollToBottom();
  return { wrap, bubble };
}

function addCodeEnhancements(el) {
  el.querySelectorAll("pre").forEach(pre => {
    const code = pre.querySelector("code");
    const langClass = code?.className?.match(/language-(\w+)/)?.[1] || "";

    const header = document.createElement("div");
    header.className = "pre-header";

    const lang = document.createElement("span");
    lang.className = "pre-lang";
    lang.textContent = langClass || "code";

    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg> Copy`;
    btn.onclick = () => {
      navigator.clipboard.writeText(code?.textContent || pre.textContent);
      btn.innerHTML = `✓ Copied`;
      btn.style.color = "var(--green)";
      setTimeout(() => {
        btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg> Copy`;
        btn.style.color = "";
      }, 2000);
    };

    header.append(lang, btn);
    pre.style.margin = "12px 0";
    pre.style.borderRadius = "8px";
    pre.style.overflow = "hidden";
    pre.style.border = "1px solid var(--border)";
    pre.insertBefore(header, pre.firstChild);

    if (code) hljs.highlightElement(code);
  });
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

// ---------------------------------------------------------------------------
// Send message
// ---------------------------------------------------------------------------
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById("prompt-input");
  const prompt = input.value.trim();
  if (!prompt) return;
  if (!currentSessionId) await newChat();

  input.value = "";
  input.style.height = "auto";

  sessions[currentSessionId].messages.push({ role: "user", content: prompt });
  if (sessions[currentSessionId].label === "New chat") {
    sessions[currentSessionId].label = prompt.slice(0, 40) + (prompt.length > 40 ? "…" : "");
  }
  appendMessage("user", prompt, false);
  renderSidebar();

  // Add streaming assistant bubble
  const { wrap, bubble } = appendMessage("assistant", "", true);
  let fullText = "";
  let toolsDiv = null;
  isStreaming = true;
  document.getElementById("send-btn").disabled = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, session_id: currentSessionId }),
    });

    if (!res.ok) {
      bubble.innerHTML = `<span style="color:var(--danger)">Server error ${res.status}</span>`;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let started = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }

        if (evt.type === "chunk") {
          if (!started) { bubble.innerHTML = ""; started = true; }
          fullText += evt.text;
          bubble.classList.add("typing-cursor");
          bubble.innerHTML = renderMarkdown(fullText);
          addCodeEnhancements(bubble);
          scrollToBottom();

        } else if (evt.type === "tool_call") {
          if (!toolsDiv) {
            toolsDiv = document.createElement("div");
            toolsDiv.style.marginTop = "6px";
            wrap.appendChild(toolsDiv);
          }
          const badge = document.createElement("div");
          badge.className = "tool-badge";
          badge.textContent = ` ${evt.tool}`;
          toolsDiv.appendChild(badge);
          scrollToBottom();

        } else if (evt.type === "usage") {
          const usageEl = document.createElement("div");
          usageEl.className = "msg-usage";
          if (evt.tokens_out) {
            usageEl.innerHTML += `<span class="usage-item"><span class="usage-dot"></span>${evt.tokens_out} tokens</span>`;
          }
          if (evt.premium_reqs) {
            usageEl.innerHTML += `<span class="usage-item"><span class="usage-dot" style="background:var(--orange)"></span>${evt.premium_reqs} premium request${evt.premium_reqs !== 1 ? 's' : ''}</span>`;
          }
          if (usageEl.innerHTML) wrap.appendChild(usageEl);

        } else if (evt.type === "done") {
          bubble.classList.remove("typing-cursor");
          sessions[currentSessionId].messages.push({ role: "assistant", content: fullText });

        } else if (evt.type === "error") {
          bubble.classList.remove("typing-cursor");
          bubble.innerHTML = `<span style="color:var(--danger)">⚠ ${escHtml(evt.message)}</span>`;
          toast("Error: " + evt.message);
        }
      }
    }
  } catch (err) {
    bubble.classList.remove("typing-cursor");
    bubble.innerHTML = `<span style="color:var(--danger)">Connection error. Is the server running?</span>`;
    console.error(err);
  } finally {
    isStreaming = false;
    bubble.classList.remove("typing-cursor");
    document.getElementById("send-btn").disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
async function logout() {
  await fetch("/api/logout", { method: "POST" });
  window.location.href = "/login.html";
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
}

document.getElementById("prompt-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 200) + "px";
});

document.getElementById("prompt-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
(async () => {
  try {
    const res = await fetch("/api/sessions");
    if (res.status === 401) { window.location.href = "/login.html"; return; }
    const list = await res.json();
    if (list.length) {
      for (const { session_id } of list) {
        sessions[session_id] = { label: "Chat", messages: [], usage: null };
      }
      await loadSession(list[list.length - 1].session_id);
    } else {
      await newChat();
    }
  } catch (e) {
    console.error("Init error:", e);
    await newChat();
  }
})();
</script>
</body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span class="logo">🤖</span>
    <span class="brand">Copilot Chat</span>
  </div>
  <button id="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New chat
  </button>
  <div id="sessions-list"></div>
  <div id="sidebar-footer">
    <button id="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="chat-header">
    <div class="status-dot"></div>
    <span>GitHub Copilot</span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="prompt-input" rows="1" placeholder="Message Copilot…"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div id="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let currentSessionId = null;
const sessions = {}; // { id: { label, messages: [] } }
let isStreaming = false;

// ---------------------------------------------------------------------------
// Markdown renderer
// ---------------------------------------------------------------------------
marked.setOptions({ breaks: true, gfm: true });
function renderMarkdown(text) {
  // marked produces HTML; sanitize before inserting
  return DOMPurify.sanitize(marked.parse(text), { USE_PROFILES: { html: true } });
}

// ---------------------------------------------------------------------------
// Session management
// ---------------------------------------------------------------------------
async function newChat() {
  const res = await fetch("/api/sessions/new", { method: "POST" });
  const { session_id } = await res.json();
  sessions[session_id] = { label: "New chat", messages: [] };
  currentSessionId = session_id;
  renderSidebar();
  renderMessages();
}

async function loadSession(id) {
  currentSessionId = id;
  // Fetch history from server in case we're on a different page
  const res = await fetch(`/api/history?session_id=${id}`);
  const history = await res.json();
  if (!sessions[id]) sessions[id] = { label: "Chat", messages: [] };
  sessions[id].messages = history;
  renderSidebar();
  renderMessages();
}

async function deleteSession(id, event) {
  event.stopPropagation();
  await fetch(`/api/sessions/${id}`, { method: "DELETE" });
  delete sessions[id];
  if (currentSessionId === id) {
    const ids = Object.keys(sessions);
    if (ids.length) await loadSession(ids[ids.length - 1]);
    else await newChat();
  } else {
    renderSidebar();
  }
}

function renderSidebar() {
  const list = document.getElementById("sessions-list");
  list.innerHTML = "";
  const ids = Object.keys(sessions).reverse();
  for (const id of ids) {
    const s = sessions[id];
    const div = document.createElement("div");
    div.className = "session-item" + (id === currentSessionId ? " active" : "");
    div.innerHTML = `
      <span class="label">${escHtml(s.label)}</span>
      <button class="del-btn" onclick="deleteSession('${id}', event)" title="Delete">✕</button>
    `;
    div.addEventListener("click", () => loadSession(id));
    list.appendChild(div);
  }
}

// ---------------------------------------------------------------------------
// Message rendering
// ---------------------------------------------------------------------------
function renderMessages() {
  const container = document.getElementById("messages");
  container.innerHTML = "";
  if (!currentSessionId) return;
  const msgs = sessions[currentSessionId]?.messages || [];
  for (const msg of msgs) appendMessage(msg.role, msg.content, false);
  scrollToBottom();
}

function appendMessage(role, content, streaming = false) {
  const container = document.getElementById("messages");
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";

  const roleEl = document.createElement("div");
  roleEl.className = `msg-role ${role}`;
  roleEl.textContent = role === "user" ? "You" : "Copilot";

  const bubble = document.createElement("div");
  bubble.className = `msg-bubble ${role}`;
  if (streaming) bubble.classList.add("typing-cursor");

  if (role === "assistant") {
    bubble.innerHTML = renderMarkdown(content || "");
    addCopyButtons(bubble);
  } else {
    bubble.textContent = content;
  }

  wrap.appendChild(roleEl);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

function addCopyButtons(el) {
  el.querySelectorAll("pre").forEach(pre => {
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.querySelector("code")?.textContent || pre.textContent);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 2000);
    };
    pre.style.position = "relative";
    pre.appendChild(btn);
    // Highlight code blocks
    pre.querySelectorAll("code").forEach(c => hljs.highlightElement(c));
  });
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

// ---------------------------------------------------------------------------
// Send message
// ---------------------------------------------------------------------------
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById("prompt-input");
  const prompt = input.value.trim();
  if (!prompt) return;
  if (!currentSessionId) await newChat();

  input.value = "";
  input.style.height = "auto";

  // Add user message
  sessions[currentSessionId].messages.push({ role: "user", content: prompt });
  if (sessions[currentSessionId].label === "New chat") {
    sessions[currentSessionId].label = prompt.slice(0, 36) + (prompt.length > 36 ? "…" : "");
  }
  appendMessage("user", prompt, false);
  renderSidebar();

  // Add assistant bubble (streaming)
  const bubble = appendMessage("assistant", "", true);
  let fullText = "";
  isStreaming = true;
  document.getElementById("send-btn").disabled = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, session_id: currentSessionId }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === "chunk") {
            fullText += evt.text;
            bubble.classList.add("typing-cursor");
            bubble.innerHTML = renderMarkdown(fullText);
            addCopyButtons(bubble);
            scrollToBottom();
          } else if (evt.type === "done") {
            bubble.classList.remove("typing-cursor");
            sessions[currentSessionId].messages.push({ role: "assistant", content: fullText });
          } else if (evt.type === "error") {
            bubble.classList.remove("typing-cursor");
            bubble.innerHTML = `<span style="color:var(--danger)">Error: ${escHtml(evt.message)}</span>`;
            toast("Error: " + evt.message);
          }
        } catch (_) {}
      }
    }
  } catch (err) {
    bubble.classList.remove("typing-cursor");
    bubble.innerHTML = `<span style="color:var(--danger)">Connection error. Is the server running?</span>`;
  } finally {
    isStreaming = false;
    document.getElementById("send-btn").disabled = false;
    bubble.classList.remove("typing-cursor");
  }
}

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
async function logout() {
  await fetch("/api/logout", { method: "POST" });
  window.location.href = "/login.html";
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
}

// Auto-resize textarea
document.getElementById("prompt-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 200) + "px";
});

// Enter to send, Shift+Enter for newline
document.getElementById("prompt-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
(async () => {
  // Load existing sessions
  const res = await fetch("/api/sessions");
  const list = await res.json();
  if (list.length) {
    for (const { session_id, messages } of list) {
      sessions[session_id] = { label: "Chat", messages: [] };
    }
    await loadSession(list[list.length - 1].session_id);
  } else {
    await newChat();
  }
})();
</script>
